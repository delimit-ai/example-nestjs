openapi: "3.0.3"
info:
  title: TaskForge API
  description: A minimal NestJS task management API.
  version: "2.0.0"
paths:
  /api/tasks:
    get:
      summary: List Tasks
      description: List all tasks, optionally filtered by status.
      operationId: listTasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      summary: Create Task
      description: Create a new task.
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskDto"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/tasks/{id}:
    get:
      summary: Get Task
      description: Get a task by ID.
      operationId: getTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/health:
    get:
      summary: Health Check
      description: Health check endpoint.
      operationId: healthCheck
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - created_at
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          default: pending
        created_at:
          type: string
          format: date-time
        assigned_to:
          type: string
          nullable: true
    CreateTaskDto:
      type: object
      required:
        - title
        - priority
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        assigned_to:
          type: string
          nullable: true
        priority:
          type: string
          enum:
            - low
            - medium
            - high
    HealthResponse:
      type: object
      required:
        - status
        - uptime
      properties:
        status:
          type: string
        uptime:
          type: string
    Error:
      type: object
      properties:
        detail:
          type: string
